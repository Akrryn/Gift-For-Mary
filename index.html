<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0010;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    overflow: hidden;
    position: relative;
  }

  #stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle linear infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  .scene {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    width: 100%;
  }

  .title {
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255, 180, 200, 0.6);
    margin-bottom: 40px;
    animation: fadeIn 2s ease forwards;
    text-align: center;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

.bouquet {
  position: relative;
  width: min(340px, 88vw);
  height: min(440px, 114vw);

  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
  transform-origin: bottom center;

  animation:
    growBouquet 1.8s cubic-bezier(.2,.8,.2,1) forwards,
    floatBouquet 5s ease-in-out infinite 1.8s;
}

@keyframes growBouquet {
  0% {
    opacity: 0;
    transform: translateY(250px) scale(0.2);
  }

  70% {
    opacity: 1;
    transform: translateY(-15px) scale(1.05);
  }

  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

  @keyframes floatBouquet {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }

  .bouquet svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 24px 60px rgba(200, 50, 100, 0.35));
  }

  .message-wrap {
    margin-top: 40px;
    text-align: center;
    animation: fadeIn 3s ease 1s both;
    padding: 0 16px;
  }

  .message {
    font-size: clamp(18px, 5.5vw, 28px);
    color: #fff;
    letter-spacing: 1px;
    line-height: 1.5;
    font-style: italic;
    text-shadow: 0 0 40px rgba(255, 120, 160, 0.6);
  }

  .message span.highlight {
    color: #ffaac8;
  }

  .sub {
    margin-top: 14px;
    font-size: clamp(10px, 3vw, 13px);
    letter-spacing: 3px;
    color: rgb(255, 180, 200);
    text-transform: uppercase;
    font-style: normal;
  }

  .petals-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .petal {
    position: absolute;
    top: -30px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fallPetal linear infinite;
  }

  @keyframes fallPetal {
    0% { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.8); }
    10% { opacity: 0.7; }
    90% { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(110vh) rotate(360deg) scale(1); }
  }

  .heart {
    display: inline-block;
    color: #ff6690;
    font-size: 18px;
    animation: heartbeat 1.4s ease-in-out infinite;
    margin: 0 4px;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.3); }
    28% { transform: scale(1); }
    42% { transform: scale(1.2); }
    56% { transform: scale(1); }
  }

  .glow-ring {
    position: absolute;
    border-radius: 50%;
    background: transparent;
    border: 1px solid rgba(255, 100, 150, 0.12);
    animation: expandRing 4s ease-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes expandRing {
    0% { transform: scale(0.5); opacity: 0.6; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  /* Small phones */
  @media (max-height: 700px) {
    .scene { padding: 20px 20px 30px; }
    .title { margin-bottom: 20px; }
    .message-wrap { margin-top: 20px; }
  }

  .explosion-heart {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  color: #ff5f9e;
  animation: heartExplosion 1.8s ease-out forwards;
  text-shadow: 0 0 12px rgba(255,90,150,.8);
}

@keyframes heartExplosion {
  0% {
    opacity: 1;
    transform: translate(0,0) scale(.4);
  }

  100% {
    opacity: 0;
    transform:
      translate(var(--x), var(--y))
      rotate(var(--r))
      scale(1.8);
  }
}

</style>
</head>

<script>
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
    starsContainer.appendChild(s);
  }

  const petalsContainer = document.getElementById('petals');
  const petalColors = ['#ff85aa','#ffb0cc','#ff6688','#ffd0e0','#e05080','#ffaacc'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 8 + Math.random() * 14;
    p.style.cssText = `width:${size}px;height:${size*0.7}px;left:${Math.random()*100}%;background:${petalColors[Math.floor(Math.random()*petalColors.length)]};opacity:0.7;animation-duration:${5+Math.random()*7}s;animation-delay:${Math.random()*8}s;`;
    petalsContainer.appendChild(p);
  }

  const bouquet = document.getElementById('bouquet');

bouquet.addEventListener('click', () => {

  bouquet.animate(
    [
      { transform: 'scale(1)' },
      { transform: 'scale(1.08)' },
      { transform: 'scale(1)' }
    ],
    {
      duration: 300
    }
  );

  const rect = bouquet.getBoundingClientRect();

  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  for (let i = 0; i < 60; i++) {

    const heart = document.createElement('div');

    heart.className = 'explosion-heart';
    heart.innerHTML = '❤';

    const angle = Math.random() * Math.PI * 2;
    const distance = 150 + Math.random() * 350;

    const x = Math.cos(angle) * distance;
    const y = Math.sin(angle) * distance;

    heart.style.left = centerX + 'px';
    heart.style.top = centerY + 'px';

    heart.style.fontSize = (18 + Math.random() * 30) + 'px';

    heart.style.setProperty('--x', x + 'px');
    heart.style.setProperty('--y', y + 'px');
    heart.style.setProperty('--r', (Math.random() * 720 - 360) + 'deg');

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 1800);
  }
});
</script>
